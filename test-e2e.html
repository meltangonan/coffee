<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee Journal - E2E Tests</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
h1 { color: #2C1810; }
.test { padding: 8px 12px; margin: 4px 0; border-radius: 4px; font-family: monospace; font-size: 13px; }
.pass { background: #d4edda; color: #155724; }
.fail { background: #f8d7da; color: #721c24; }
.pending { background: #fff3cd; color: #856404; }
.summary { margin-top: 20px; padding: 16px; border-radius: 8px; font-weight: 600; }
.summary.all-pass { background: #d4edda; color: #155724; }
.summary.has-fail { background: #f8d7da; color: #721c24; }
#app-frame { display: none; }
</style>
</head>
<body>
<h1>Coffee Journal - E2E Integration Tests</h1>
<p>These tests load the actual app and verify functionality works as expected.</p>
<div id="results"></div>
<div id="summary"></div>

<!-- Hidden iframe to load the app -->
<iframe id="app-frame" src="index.html" width="400" height="600"></iframe>

<script>
const results = [];
let appWindow = null;
let Alpine = null;
let app = null;

function test(name, fn) {
  return new Promise(async (resolve) => {
    const div = document.createElement('div');
    div.className = 'test pending';
    div.textContent = `⏳ ${name}`;
    document.getElementById('results').appendChild(div);

    try {
      await fn();
      div.className = 'test pass';
      div.textContent = `✓ ${name}`;
      results.push({ name, pass: true });
    } catch (e) {
      div.className = 'test fail';
      div.textContent = `✗ ${name} — ${e.message}`;
      results.push({ name, pass: false, error: e.message });
    }
    resolve();
  });
}

function assert(condition, message) {
  if (!condition) throw new Error(message || 'Assertion failed');
}

function assertEqual(actual, expected, message) {
  if (actual !== expected) {
    throw new Error(message || `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function waitForAlpine() {
  const frame = document.getElementById('app-frame');
  appWindow = frame.contentWindow;

  // Wait for Alpine to be ready
  for (let i = 0; i < 50; i++) {
    if (appWindow.Alpine && appWindow.Alpine.store) {
      Alpine = appWindow.Alpine;
      break;
    }
    await wait(100);
  }

  if (!Alpine) throw new Error('Alpine.js did not load');

  // Wait for app to initialize
  await wait(200);

  // Get the app data
  const appEl = appWindow.document.querySelector('[x-data="app()"]');
  if (appEl && appEl._x_dataStack) {
    app = appEl._x_dataStack[0];
  }

  if (!app) throw new Error('App data not accessible');
}

// Clear localStorage before tests
function resetApp() {
  appWindow.localStorage.removeItem('coffee_beans');
  appWindow.localStorage.removeItem('coffee_shots');
  appWindow.location.reload();
}

function localDateStr(d = new Date()) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function seedTestFixture() {
  const now = new Date().toISOString();
  const today = localDateStr();
  app.beans = [
    {
      id: 'e2e-active-bean',
      name: 'E2E Active Bean',
      roaster: 'E2E Roaster',
      roastDate: today,
      rating: 4,
      notes: 'Active test bean',
      isArchived: false,
      optimalGrindSize: 6,
      optimalDoseIn: 18,
      optimalYieldOut: 36,
      optimalExtractionTime: 25,
      createdAt: now
    },
    {
      id: 'e2e-archived-bean',
      name: 'E2E Archived Bean',
      roaster: 'E2E Roaster',
      roastDate: today,
      rating: 3,
      notes: 'Archived test bean',
      isArchived: true,
      optimalGrindSize: 7,
      optimalDoseIn: 18,
      optimalYieldOut: 36,
      optimalExtractionTime: 27,
      createdAt: now
    }
  ];
  app.shots = [
    {
      id: 'e2e-shot-1',
      beanId: 'e2e-active-bean',
      grindSize: 6,
      doseIn: 18,
      yieldOut: 36,
      extractionTime: 25,
      rating: 'great',
      notes: 'Fixture shot',
      shotDate: today,
      createdAt: now
    }
  ];
  app.saveBeans();
  app.saveShots();
}

async function runTests() {
  const frame = document.getElementById('app-frame');
  frame.style.display = 'block';

  // Wait for iframe to load
  await new Promise(resolve => {
    frame.onload = resolve;
    if (frame.contentDocument?.readyState === 'complete') resolve();
  });

  await waitForAlpine();
  seedTestFixture();

  // ========================================
  // TESTS
  // ========================================

  await test('App test fixture initializes with data', async () => {
    assert(app.beans.length > 0, 'Should have beans');
    assert(app.shots.length > 0, 'Should have shots');
  });

  await test('currentBeans filters out archived beans', async () => {
    const archived = app.beans.filter(b => b.isArchived);
    const current = app.currentBeans;
    assert(archived.length > 0, 'Should have archived beans in test fixture');
    current.forEach(b => {
      assert(!b.isArchived, 'Current beans should not be archived');
    });
  });

  await test('archivedBeans returns only archived beans', async () => {
    const archived = app.archivedBeans;
    archived.forEach(b => {
      assert(b.isArchived, 'Archived beans should be archived');
    });
  });

  await test('archivedBeans sorts by date added, newest first', async () => {
    const testBeans = [
      {
        id: 'e2e-archived-added-old',
        name: 'E2E Archived Added Old',
        roaster: 'E2E Roaster',
        roastDate: '2026-05-18',
        rating: 3,
        notes: '',
        isArchived: true,
        optimalGrindSize: 7,
        optimalDoseIn: 18,
        optimalYieldOut: 36,
        optimalExtractionTime: 27,
        createdAt: '2026-01-01T08:00:00.000Z'
      },
      {
        id: 'e2e-archived-added-new',
        name: 'E2E Archived Added New',
        roaster: 'E2E Roaster',
        roastDate: '2026-01-01',
        rating: 3,
        notes: '',
        isArchived: true,
        optimalGrindSize: 7,
        optimalDoseIn: 18,
        optimalYieldOut: 36,
        optimalExtractionTime: 27,
        createdAt: '2026-02-01T08:00:00.000Z'
      }
    ];

    app.beans.push(...testBeans);
    try {
      const archivedIds = app.archivedBeans.map(b => b.id);
      assert(
        archivedIds.indexOf('e2e-archived-added-new') < archivedIds.indexOf('e2e-archived-added-old'),
        'More recently added archived bean should appear first'
      );
    } finally {
      app.beans = app.beans.filter(b => !testBeans.some(testBean => testBean.id === b.id));
    }
  });

  await test('getFreshness returns correct status for each stage', async () => {
    // Create test beans with different roast dates
    const today = new Date().toISOString().slice(0, 10);

    // Resting (0-6 days)
    const restingBean = { roastDate: today };
    assertEqual(app.getFreshness(restingBean).status, 'resting');

    // Optimal (7-21 days)
    const optimalDate = new Date();
    optimalDate.setDate(optimalDate.getDate() - 10);
    const optimalBean = { roastDate: optimalDate.toISOString().slice(0, 10) };
    assertEqual(app.getFreshness(optimalBean).status, 'optimal');

    // Past peak (22+ days)
    const pastDate = new Date();
    pastDate.setDate(pastDate.getDate() - 30);
    const pastBean = { roastDate: pastDate.toISOString().slice(0, 10) };
    assertEqual(app.getFreshness(pastBean).status, 'past');
  });

  await test('getBeanById returns correct bean', async () => {
    const firstBean = app.beans[0];
    const found = app.getBeanById(firstBean.id);
    assertEqual(found.id, firstBean.id);
    assertEqual(found.name, firstBean.name);
  });

  await test('getBeanById returns null for invalid id', async () => {
    const found = app.getBeanById('nonexistent-id');
    assert(found === null, 'Should return null for invalid id');
  });

  await test('getShotsForBean returns shots for specific bean', async () => {
    const beanWithShots = app.beans.find(b =>
      app.shots.some(s => s.beanId === b.id)
    );
    if (beanWithShots) {
      const shots = app.getShotsForBean(beanWithShots.id);
      assert(shots.length > 0, 'Should have shots');
      shots.forEach(s => {
        assertEqual(s.beanId, beanWithShots.id);
      });
    }
  });

  await test('getLastShot prefers later entries when timestamps match', async () => {
    const beanName = 'Last Shot Tie Bean ' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    app.openBeanForm(null);
    app.beanForm.name = beanName;
    app.beanForm.roaster = 'E2E Test Roaster';
    app.saveBean();
    const bean = app.beans.find(b => b.name === beanName);
    assert(bean, 'Bean should exist');

    const createdAt = '2026-05-05T12:00:00.000Z';
    const firstShot = {
      id: appWindow.crypto.randomUUID(),
      beanId: bean.id,
      grindSize: 5,
      doseIn: 18,
      yieldOut: 36,
      extractionTime: 25,
      rating: null,
      notes: '',
      shotDate: '2026-05-05',
      createdAt
    };
    const secondShot = { ...firstShot, id: appWindow.crypto.randomUUID(), grindSize: 4 };
    app.shots.push(firstShot, secondShot);
    app.saveShots();

    assertEqual(app.getLastShot(bean.id).id, secondShot.id);
  });

  await test('todayShots filters to only today', async () => {
    const todayShots = app.todayShots;
    const today = new Date();
    todayShots.forEach(s => {
      const shotDate = new Date(s.createdAt);
      assertEqual(shotDate.toDateString(), today.toDateString());
    });
  });

  await test('Stats shot counts render from seeded shots', async () => {
    const originalShots = app.shots;
    const today = localDateStr();
    app.shots = [
      { id: 'stats-today', beanId: 'e2e-active-bean', shotDate: today, createdAt: new Date().toISOString() },
      { id: 'stats-old', beanId: 'e2e-active-bean', shotDate: '2000-01-01', createdAt: '2000-01-01T08:00:00.000Z' }
    ];

    try {
      assertEqual(app.statsTotalShots, 2, 'Total shots should include all fixture shots');
      assertEqual(app.statsShotsThisMonth, 1, 'This month should include the current-month fixture shot');
      assertEqual(app.statsShotsThisWeek, 1, 'This week should include the current-week fixture shot');

      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      assertEqual(doc.querySelector('[data-testid="stats-total-shots"]').textContent, '2');
      assertEqual(doc.querySelector('[data-testid="stats-month-shots"]').textContent, '1');
      assertEqual(doc.querySelector('[data-testid="stats-week-shots"]').textContent, '1');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats brew rhythm heatmap and run facts render', async () => {
    const originalShots = app.shots;
    const dayStr = offset => {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return localDateStr(d);
    };
    const shotAt = (id, dayOffset) => ({
      id, beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18, yieldOut: 36,
      extractionTime: 25, rating: null, notes: '',
      shotDate: dayStr(dayOffset), createdAt: new Date().toISOString()
    });
    // brew days: today (2 shots), yesterday (1), 3 days ago (3), 4 days ago (1)
    app.shots = [
      shotAt('rhythm-1', 0), shotAt('rhythm-2', 0),
      shotAt('rhythm-3', -1),
      shotAt('rhythm-4', -3), shotAt('rhythm-5', -3), shotAt('rhythm-6', -3),
      shotAt('rhythm-7', -4)
    ];

    try {
      assertEqual(app.statsBrewDayRuns.current, 2, 'Run ending today should span today and yesterday');
      assertEqual(app.statsBrewDayRuns.longest, 2, 'Longest run should be 2 days');

      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      const cells = doc.querySelectorAll('[data-testid^="stats-heatmap-cell-"]');
      assertEqual(cells.length, 91, 'Heatmap should render 13 weeks of 7 days');

      const todayCell = doc.querySelector('[data-testid="stats-heatmap-cell-' + dayStr(0) + '"]');
      assert(todayCell, 'Today cell should exist');
      assert(todayCell.classList.contains('level-2'), 'Two shots today should be bucket 2');
      assert(todayCell.getAttribute('title').includes('2 shots'), 'Cell title should include the shot count');
      assert(doc.querySelector('[data-testid="stats-heatmap-cell-' + dayStr(-1) + '"]').classList.contains('level-1'),
        'One shot should be bucket 1');
      assert(doc.querySelector('[data-testid="stats-heatmap-cell-' + dayStr(-3) + '"]').classList.contains('level-3'),
        'Three shots should be bucket 3');
      assert(doc.querySelector('[data-testid="stats-heatmap-cell-' + dayStr(-2) + '"]').classList.contains('level-0'),
        'No shots should be bucket 0');

      const runFacts = doc.querySelector('[data-testid="stats-run-facts"]').textContent;
      assertEqual(runFacts, 'Current run: 2 brew days · Longest: 2');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats brew patterns show facts above the data thresholds', async () => {
    const originalShots = app.shots;
    // offsets in multiples of 7 keep every shot on today's weekday, across 4 distinct weeks
    const shotAtOffsetHour = (id, dayOffset, hour) => {
      const d = new Date();
      d.setDate(d.getDate() + dayOffset);
      d.setHours(hour, 15, 0, 0);
      return {
        id, beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18, yieldOut: 36,
        extractionTime: 25, rating: null, notes: '', shotDate: localDateStr(d),
        createdAt: d.toISOString()
      };
    };
    const shots = [];
    [0, -7, -14, -21].forEach((offset, week) => {
      for (let i = 0; i < 3; i++) shots.push(shotAtOffsetHour('pattern-' + week + '-' + i, offset, 7));
    });
    app.shots = shots;

    const dayNamesSundayFirst = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const expectedDay = dayNamesSundayFirst[new Date().getDay()];

    try {
      assert(app.statsDayOfWeekPattern.eligible, '12 shots across 4 weeks should be eligible');
      assert(app.statsBrewHourPattern.eligible, '12 same-day shots should be eligible');

      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      assertEqual(
        doc.querySelector('[data-testid="stats-busiest-day"]').textContent,
        expectedDay + ' is your biggest brew day'
      );
      assertEqual(
        doc.querySelector('[data-testid="stats-brew-hour"]').textContent,
        'Your brew hour: 7am'
      );
      const emptyState = doc.querySelector('[data-testid="stats-patterns-empty"]');
      assertEqual(emptyState.style.display, 'none', 'Empty state should be hidden above threshold');
      const bars = doc.querySelectorAll('.stats-dow-fill');
      assertEqual(bars.length, 7, 'Should render a bar per weekday');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats brew patterns show empty state below the data thresholds', async () => {
    const originalShots = app.shots;
    app.shots = [
      { id: 'few-1', beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18, yieldOut: 36,
        extractionTime: 25, rating: null, notes: '', shotDate: localDateStr(), createdAt: new Date().toISOString() }
    ];

    try {
      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      const emptyState = doc.querySelector('[data-testid="stats-patterns-empty"]');
      assert(emptyState, 'Empty state node should exist');
      assert(emptyState.style.display !== 'none', 'Empty state should be visible below threshold');
      assert(!doc.querySelector('[data-testid="stats-busiest-day"]'), 'Busiest-day fact should not render');
      assert(!doc.querySelector('[data-testid="stats-brew-hour"]'), 'Brew-hour fact should not render');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats superlatives and fun totals render computed values', async () => {
    const originalShots = app.shots;
    // four shots today keeps every expectation weekday-independent
    const today = localDateStr();
    app.shots = Array.from({ length: 4 }, (_, i) => ({
      id: 'superlative-' + i, beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18,
      yieldOut: 36, extractionTime: 25, rating: null, notes: '',
      shotDate: today, createdAt: new Date().toISOString()
    }));

    try {
      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      const todayLabel = new Date().toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
      assertEqual(
        doc.querySelector('[data-testid="stats-biggest-day-fact"]').textContent,
        todayLabel + ' · 4 shots'
      );
      assertEqual(
        doc.querySelector('[data-testid="stats-longest-run-fact"]').textContent,
        '1 brew day'
      );
      const bestWeek = doc.querySelector('[data-testid="stats-best-week-fact"]').textContent;
      assert(bestWeek.startsWith('Week of '), 'Best week should be phrased as "Week of ..."');
      assert(bestWeek.endsWith('· 4 shots'), 'Best week should count all four shots');
      assertEqual(doc.querySelector('[data-testid="stats-total-ground"]').textContent, '72 g');
      assertEqual(doc.querySelector('[data-testid="stats-total-pulled"]').textContent, '144 ml');
      assertEqual(doc.querySelector('[data-testid="stats-total-time"]').textContent, '1 min');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats monthly recap renders the last completed month with deltas', async () => {
    const originalShots = app.shots;
    const monthDay = (monthOffset, day) => {
      const now = new Date();
      return localDateStr(new Date(now.getFullYear(), now.getMonth() + monthOffset, day));
    };
    const recapShot = (id, shotDate, rating) => ({
      id, beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18, yieldOut: 36,
      extractionTime: 25, rating, notes: '', shotDate, createdAt: new Date().toISOString()
    });
    // last month: 3 shots over 2 days; month before: 1 shot
    app.shots = [
      recapShot('recap-1', monthDay(-1, 5), 'great'),
      recapShot('recap-2', monthDay(-1, 5), 'great'),
      recapShot('recap-3', monthDay(-1, 12), 'perfect'),
      recapShot('recap-4', monthDay(-2, 10), null)
    ];

    try {
      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      assert(doc.querySelector('[data-testid="stats-recap-card"]'), 'Recap card should render');
      assertEqual(doc.querySelector('[data-testid="stats-recap-shots"]').textContent, '3');
      assertEqual(doc.querySelector('[data-testid="stats-recap-days"]').textContent, '2');
      assertEqual(doc.querySelector('[data-testid="stats-recap-ground"]').textContent, '54 g');
      assertEqual(doc.querySelector('[data-testid="stats-recap-top-bean"]').textContent, 'E2E Active Bean');
      assertEqual(doc.querySelector('[data-testid="stats-recap-quality"]').textContent, '2 great · 1 perfect');
      const delta = doc.querySelector('[data-testid="stats-recap-delta"]').textContent;
      assert(delta.includes('2 more shots'), 'Delta should compare shots to the month before');
      assert(delta.includes('1 more brew day'), 'Delta should compare brew days to the month before');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats monthly recap is hidden when last month had no shots', async () => {
    const originalShots = app.shots;
    app.shots = [
      { id: 'recap-none', beanId: 'e2e-active-bean', grindSize: 6, doseIn: 18, yieldOut: 36,
        extractionTime: 25, rating: null, notes: '', shotDate: localDateStr(), createdAt: new Date().toISOString() }
    ];

    try {
      app.activateTab('stats');
      await wait(50);
      assert(!appWindow.document.querySelector('[data-testid="stats-recap-card"]'),
        'Recap card should not render without last-month shots');
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Stats most-pulled beans aggregate copied bags', async () => {
    const originalBeans = app.beans;
    const originalShots = app.shots;
    app.beans = [
      {
        id: 'stats-new-bag',
        name: 'Stats Blend',
        roaster: 'E2E Roaster',
        roastDate: '2026-05-01',
        rating: null,
        notes: '',
        isArchived: false,
        createdAt: '2026-05-01T08:00:00.000Z'
      },
      {
        id: 'stats-old-bag',
        name: ' stats blend ',
        roaster: 'E2E Roaster',
        roastDate: '2026-04-01',
        rating: null,
        notes: '',
        isArchived: true,
        createdAt: '2026-04-01T08:00:00.000Z'
      }
    ];
    app.shots = [
      { id: 'stats-shot-1', beanId: 'stats-old-bag', shotDate: localDateStr(), createdAt: new Date().toISOString() },
      { id: 'stats-shot-2', beanId: 'stats-old-bag', shotDate: localDateStr(), createdAt: new Date().toISOString() },
      { id: 'stats-shot-3', beanId: 'stats-new-bag', shotDate: localDateStr(), createdAt: new Date().toISOString() }
    ];

    try {
      const topBeans = app.statsMostPulledBeans;
      assertEqual(topBeans[0].key, 'stats blend|e2e roaster');
      assertEqual(topBeans[0].shotCount, 3);
      assertEqual(topBeans[0].bagCount, 2);
      assert(!topBeans[0].isArchived, 'Mixed active/archived group should not be marked archived');

      app.activateTab('stats');
      await wait(50);
      const cardText = appWindow.document.querySelector('[data-testid="stats-most-pulled-card"]').textContent;
      assert(cardText.includes('Stats Blend'), 'Stats card should show grouped bean');
      assert(cardText.includes('2 bags'), 'Stats card should show bag count');
      assert(cardText.includes('3 shots'), 'Stats card should show aggregated shot count');
    } finally {
      app.beans = originalBeans;
      app.shots = originalShots;
    }
  });

  await test('Stats quality breakdown renders computed values', async () => {
    const originalShots = app.shots;
    app.shots = [
      {
        id: 'summary-shot-1',
        beanId: 'e2e-active-bean',
        grindSize: 5,
        doseIn: 18,
        yieldOut: 36,
        extractionTime: 25,
        rating: 'perfect',
        shotDate: localDateStr(),
        createdAt: new Date().toISOString()
      },
      {
        id: 'summary-shot-2',
        beanId: 'e2e-active-bean',
        grindSize: 7,
        doseIn: 20,
        yieldOut: 30,
        extractionTime: 35,
        rating: 'bad',
        shotDate: localDateStr(),
        createdAt: new Date().toISOString()
      },
      {
        id: 'summary-shot-3',
        beanId: 'e2e-active-bean',
        grindSize: 6,
        doseIn: 18,
        yieldOut: null,
        extractionTime: null,
        rating: null,
        shotDate: localDateStr(),
        createdAt: new Date().toISOString()
      }
    ];

    try {
      assertEqual(app.statsQualityBreakdown.ratedTotal, 2);
      assertEqual(app.statsQualityBreakdown.items.find(item => item.rating === 'bad').percentage, 50);
      assertEqual(app.statsQualityBreakdown.items.find(item => item.rating === 'perfect').percentage, 50);

      app.activateTab('stats');
      await wait(50);
      const doc = appWindow.document;
      assert(!doc.querySelector('[data-testid="stats-grind-card"]'), 'Aggregate grind card should not render');
      assert(!doc.querySelector('[data-testid="stats-dial-in-card"]'), 'Aggregate dial-in card should not render');
      assert(doc.querySelector('[data-testid="stats-quality-bad"]').textContent.includes('1 · 50%'));
      assert(doc.querySelector('[data-testid="stats-quality-perfect"]').textContent.includes('1 · 50%'));
    } finally {
      app.shots = originalShots;
    }
  });

  await test('Bean detail trend charts render with two or more shots', async () => {
    const originalShots = app.shots;
    app.shots = [
      {

  await test('normalizeImportedShot backfills missing legacy yield/time', async () => {
    const bean = app.beans.find(b => !b.isArchived);
    const normalized = app.normalizeImportedShot({
      id: appWindow.crypto.randomUUID(),
      beanId: bean.id,
      grindSize: 6,
      doseIn: 18,
      yieldOut: null,
      extractionTime: '',
      createdAt: '2026-01-15T08:00:00.000Z'
    });
    assert(normalized, 'Legacy shot should be normalized');
    assertEqual(normalized.yieldOut, 36);
    assertEqual(normalized.extractionTime, 25);
  });

  await test('normalizeImportedShot rejects explicit invalid yield/time', async () => {
    const bean = app.beans.find(b => !b.isArchived);
    const invalidYield = app.normalizeImportedShot({
      id: appWindow.crypto.randomUUID(),
      beanId: bean.id,
      grindSize: 6,
      doseIn: 18,
      yieldOut: 'bad',
      extractionTime: 25,
      createdAt: '2026-01-15T08:00:00.000Z'
    });
    const invalidExtraction = app.normalizeImportedShot({
      id: appWindow.crypto.randomUUID(),
      beanId: bean.id,
      grindSize: 6,
      doseIn: 18,
      yieldOut: 36,
      extractionTime: 0,
      createdAt: '2026-01-15T08:00:00.000Z'
    });
    assertEqual(invalidYield, null);
    assertEqual(invalidExtraction, null);
  });

  await test('deleteShot removes shot', async () => {
    const shot = app.shots[0];
    const initialCount = app.shots.length;
    app.deleteShot(shot.id);
    assertEqual(app.shots.length, initialCount - 1);
    const deleted = app.shots.find(s => s.id === shot.id);
    assert(!deleted, 'Shot should be deleted');
  });

  await test('deleteBean removes bean and related shots', async () => {
    // Create a test bean with shots
    app.openBeanForm(null);
    app.beanForm.name = 'Delete Test Bean';
    app.beanForm.roaster = 'Delete Test Roaster';
    app.saveBean();

    const bean = app.beans.find(b => b.name === 'Delete Test Bean');
    app.selectBean(bean.id);

    // Add a shot
    app.openShotForm(bean.id);
    app.shotForm.grindSize = 5;
    app.saveShot();

    const beanId = bean.id;
    const shotsBefore = app.shots.filter(s => s.beanId === beanId).length;
    assert(shotsBefore > 0, 'Should have shots before delete');

    app.deleteBean(beanId);

    const deletedBean = app.getBeanById(beanId);
    assert(!deletedBean, 'Bean should be deleted');

    const shotsAfter = app.shots.filter(s => s.beanId === beanId).length;
    assertEqual(shotsAfter, 0, 'Related shots should be deleted');
  });

  await test('calendarWeeks generates correct week structure', async () => {
    const weeks = app.calendarWeeks;
    assert(weeks.length >= 4 && weeks.length <= 6, 'Should have 4-6 weeks');
    weeks.forEach(week => {
      assertEqual(week.length, 7, 'Each week should have 7 days');
    });
  });

  await test('formatDate returns formatted string', async () => {
    const result = app.formatDate('2026-01-15T08:00:00');
    assert(result.includes('Jan'), 'Should include month');
    assert(result.includes('15'), 'Should include day');
  });

  await test('formatRoastDate handles empty input', async () => {
    assertEqual(app.formatRoastDate(''), '');
    assertEqual(app.formatRoastDate(null), '');
  });

  await test('shotQualityLabel capitalizes rating', async () => {
    assertEqual(app.shotQualityLabel('bad'), 'Bad');
    assertEqual(app.shotQualityLabel('okay'), 'Okay');
    assertEqual(app.shotQualityLabel('great'), 'Great');
    assertEqual(app.shotQualityLabel('perfect'), 'Perfect');
    assertEqual(app.shotQualityLabel(null), null);
  });

  await test('Tab navigation works', async () => {
    app.currentTab = 'today';
    assertEqual(app.currentTab, 'today');

    app.currentTab = 'beans';
    assertEqual(app.currentTab, 'beans');

    app.currentTab = 'calendar';
    assertEqual(app.currentTab, 'calendar');
  });

  await test('localStorage persistence works', async () => {
    const beansJson = appWindow.localStorage.getItem('coffee_beans');
    const shotsJson = appWindow.localStorage.getItem('coffee_shots');

    assert(beansJson, 'Beans should be in localStorage');
    assert(shotsJson, 'Shots should be in localStorage');

    const beans = JSON.parse(beansJson);
    const shots = JSON.parse(shotsJson);

    assert(Array.isArray(beans), 'Beans should be an array');
    assert(Array.isArray(shots), 'Shots should be an array');
  });

  await test('crypto.randomUUID polyfill works', async () => {
    const uuid = appWindow.crypto.randomUUID();
    assert(uuid.length === 36, 'UUID should be 36 characters');
    assert(uuid.includes('-'), 'UUID should contain dashes');
    // Check format
    const parts = uuid.split('-');
    assertEqual(parts.length, 5, 'UUID should have 5 parts');
  });

  // ========================================
  // SUMMARY
  // ========================================

  const passed = results.filter(r => r.pass).length;
  const failed = results.filter(r => !r.pass).length;

  const summary = document.getElementById('summary');
  summary.className = `summary ${failed > 0 ? 'has-fail' : 'all-pass'}`;
  summary.textContent = `${passed} passed, ${failed} failed out of ${results.length} tests`;

  // Hide the iframe after tests
  frame.style.display = 'none';
}

// Run tests when page loads
window.onload = runTests;
</script>
