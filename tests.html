<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee Journal - Tests</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
h1 { color: #2C1810; }
.test { padding: 8px 12px; margin: 4px 0; border-radius: 4px; }
.pass { background: #d4edda; color: #155724; }
.fail { background: #f8d7da; color: #721c24; }
.summary { margin-top: 20px; padding: 16px; border-radius: 8px; font-weight: 600; }
.summary.all-pass { background: #d4edda; color: #155724; }
.summary.has-fail { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h1>Coffee Journal - Test Suite</h1>
<div id="results"></div>
<div id="summary"></div>

<script>
// Test utilities
const results = [];
function test(name, fn) {
  try {
    fn();
    results.push({ name, pass: true });
  } catch (e) {
    results.push({ name, pass: false, error: e.message });
  }
}
function assert(condition, message) {
  if (!condition) throw new Error(message || 'Assertion failed');
}
function assertEqual(actual, expected, message) {
  if (actual !== expected) {
    throw new Error(message || `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}
function assertDeepEqual(actual, expected, message) {
  if (JSON.stringify(actual) !== JSON.stringify(expected)) {
    throw new Error(message || `Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
  }
}

// ========================================
// Helper functions (extracted from app)
// ========================================

function localDateStr(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function isSameDay(d1, d2) {
  const a = new Date(d1), b = new Date(d2);
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function daysBetween(d1, d2) {
  return Math.floor((new Date(d2) - new Date(d1)) / 86400000);
}

const STATS_TOP_BEANS_LIMIT = 5;
const STATS_HEATMAP_WEEKS = 13; // 12 full Mon-start weeks + current week
const STATS_SWEET_SPOT_MIN_SHOTS = 10; // sweet spot needs this many great/perfect shots
const BEAN_TREND_CHART_WIDTH = 240;
const BEAN_TREND_CHART_HEIGHT = 96;
const BEAN_TREND_CHART_PADDING_X = 8;
const BEAN_TREND_CHART_PADDING_Y = 10;
const BEAN_TREND_VALUE_PADDING_RATIO = 0.12;
const SHOT_QUALITY_ORDER = ['bad', 'okay', 'great', 'perfect'];

function parseStatsDate(value) {
  if (!value) return null;
  if (value instanceof Date) {
    return new Date(value.getFullYear(), value.getMonth(), value.getDate());
  }
  const text = String(value);
  const datePart = text.slice(0, 10);
  if (/^\d{4}-\d{2}-\d{2}$/.test(datePart)) {
    const [year, month, day] = datePart.split('-').map(Number);
    return new Date(year, month - 1, day);
  }
  const parsed = new Date(text);
  if (isNaN(parsed.getTime())) return null;
  return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
}

function getShotStatsDate(shot) {
  return parseStatsDate(shot?.shotDate || shot?.createdAt);
}

function getWeekStart(date) {
  const d = parseStatsDate(date) || parseStatsDate(new Date());
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getMonthStart(date) {
  const d = parseStatsDate(date) || parseStatsDate(new Date());
  return new Date(d.getFullYear(), d.getMonth(), 1);
}

function computeShotCounts(shots, refDate = new Date()) {
  const allShots = Array.isArray(shots) ? shots : [];
  const weekStart = getWeekStart(refDate);
  const weekEnd = addDays(weekStart, 7);
  const monthStart = getMonthStart(refDate);
  const monthEnd = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 1);
  let thisWeek = 0;
  let thisMonth = 0;
  for (const shot of allShots) {
    const shotDate = getShotStatsDate(shot);
    if (!shotDate) continue;
    if (shotDate >= weekStart && shotDate < weekEnd) thisWeek++;
    if (shotDate >= monthStart && shotDate < monthEnd) thisMonth++;
  }
  return { total: allShots.length, thisWeek, thisMonth };
}

function computeBrewDayRuns(shots, refDate = new Date()) {
  const brewDays = new Set();
  for (const shot of Array.isArray(shots) ? shots : []) {
    const date = getShotStatsDate(shot);
    if (date) brewDays.add(localDateStr(date));
  }
  let longest = 0;
  for (const day of brewDays) {
    const start = parseStatsDate(day);
    if (brewDays.has(localDateStr(addDays(start, -1)))) continue; // not a run start
    let length = 1;
    while (brewDays.has(localDateStr(addDays(start, length)))) length++;
    if (length > longest) longest = length;
  }
  const today = parseStatsDate(refDate) || parseStatsDate(new Date());
  let cursor = null;
  if (brewDays.has(localDateStr(today))) cursor = today;
  else if (brewDays.has(localDateStr(addDays(today, -1)))) cursor = addDays(today, -1);
  let current = 0;
  while (cursor && brewDays.has(localDateStr(cursor))) {
    current++;
    cursor = addDays(cursor, -1);
  }
  return { current, longest };
}

function computeHeatmapWeeks(shots, refDate = new Date()) {
  const counts = new Map();
  for (const shot of Array.isArray(shots) ? shots : []) {
    const date = getShotStatsDate(shot);
    if (!date) continue;
    const key = localDateStr(date);
    counts.set(key, (counts.get(key) || 0) + 1);
  }
  const currentWeekStart = getWeekStart(refDate);
  const weeks = [];
  for (let weekIndex = STATS_HEATMAP_WEEKS - 1; weekIndex >= 0; weekIndex--) {
    const weekStart = addDays(currentWeekStart, -7 * weekIndex);
    const days = [];
    for (let dayIndex = 0; dayIndex < 7; dayIndex++) {
      const date = localDateStr(addDays(weekStart, dayIndex));
      const count = counts.get(date) || 0;
      days.push({ date, count, bucket: Math.min(count, 3) });
    }
    weeks.push({ weekStart: localDateStr(weekStart), days });
  }
  return weeks;
}

function formatGramsTotal(grams) {
  if (grams >= 1000) return (Math.round((grams / 1000) * 10) / 10) + ' kg';
  return Math.round(grams) + ' g';
}

function getPercentileValue(sortedValues, fraction) {
  if (!sortedValues.length) return null;
  const index = (sortedValues.length - 1) * fraction;
  const lower = Math.floor(index);
  const upper = Math.ceil(index);
  return sortedValues[lower] + (sortedValues[upper] - sortedValues[lower]) * (index - lower);
}

function computeSweetSpot(shots) {
  const ratios = [];
  const times = [];
  let count = 0;
  for (const shot of Array.isArray(shots) ? shots : []) {
    const rating = normalizeRating(shot?.rating);
    if (rating !== 'great' && rating !== 'perfect') continue;
    const doseIn = Number(shot?.doseIn);
    const yieldOut = Number(shot?.yieldOut);
    const extractionTime = Number(shot?.extractionTime);
    const valid = Number.isFinite(doseIn) && doseIn > 0
      && Number.isFinite(yieldOut) && yieldOut > 0
      && Number.isFinite(extractionTime) && extractionTime > 0;
    if (!valid) continue;
    ratios.push(yieldOut / doseIn);
    times.push(extractionTime);
    count++;
  }
  if (count < STATS_SWEET_SPOT_MIN_SHOTS) {
    return { eligible: false, count, ratio: null, time: null };
  }
  ratios.sort((a, b) => a - b);
  times.sort((a, b) => a - b);
  return {
    eligible: true,
    count,
    ratio: { low: getPercentileValue(ratios, 0.25), high: getPercentileValue(ratios, 0.75) },
    time: { low: getPercentileValue(times, 0.25), high: getPercentileValue(times, 0.75) }
  };
}

function computeMonthlyRecap(shots, beans, refDate = new Date()) {
  const currentMonthStart = getMonthStart(refDate);
  const recapStart = new Date(currentMonthStart.getFullYear(), currentMonthStart.getMonth() - 1, 1);
  const prevStart = new Date(currentMonthStart.getFullYear(), currentMonthStart.getMonth() - 2, 1);
  const recapShots = [];
  let prevShotCount = 0;
  const prevDays = new Set();
  for (const shot of Array.isArray(shots) ? shots : []) {
    const date = getShotStatsDate(shot);
    if (!date) continue;
    if (date >= recapStart && date < currentMonthStart) recapShots.push(shot);
    else if (date >= prevStart && date < recapStart) {
      prevShotCount++;
      prevDays.add(localDateStr(date));
    }
  }
  if (!recapShots.length) return null;
  const days = new Set();
  let grams = 0;
  for (const shot of recapShots) {
    days.add(localDateStr(getShotStatsDate(shot)));
    const doseIn = Number(shot?.doseIn);
    if (Number.isFinite(doseIn) && doseIn > 0) grams += doseIn;
  }
  return {
    month: recapStart.getMonth(),
    year: recapStart.getFullYear(),
    prevMonth: prevStart.getMonth(),
    shotCount: recapShots.length,
    daysBrewed: days.size,
    coffeeGround: formatGramsTotal(grams),
    topBean: computeMostPulledBeans(recapShots, beans, 1)[0] || null,
    quality: computeQualityBreakdown(recapShots),
    deltas: prevShotCount > 0
      ? { shots: recapShots.length - prevShotCount, days: days.size - prevDays.size }
      : null
  };
}

function computeMostPulledBeans(shots, beans, limit = STATS_TOP_BEANS_LIMIT) {
  const counts = new Map();
  for (const shot of Array.isArray(shots) ? shots : []) {
    if (!shot?.beanId) continue;
    counts.set(shot.beanId, (counts.get(shot.beanId) || 0) + 1);
  }

  const groups = new Map();
  for (const bean of Array.isArray(beans) ? beans : []) {
    const name = (bean.name || 'Unknown bean').trim();
    const roaster = (bean.roaster || '').trim();
    const key = (name.toLowerCase() + '|' + roaster.toLowerCase()).trim() || bean.id;
    const group = groups.get(key) || {
      key,
      name,
      roaster,
      isArchived: true,
      shotCount: 0,
      bagCount: 0,
      newestCreatedAt: ''
    };
    const createdAt = bean.createdAt || '';
    const shouldUseBeanLabel = group.bagCount === 0
      || (group.isArchived && !bean.isArchived)
      || (group.isArchived === !!bean.isArchived && new Date(createdAt || 0) > new Date(group.newestCreatedAt || 0));
    if (shouldUseBeanLabel) {
      group.name = name;
      group.roaster = roaster;
      group.newestCreatedAt = createdAt;
    }
    group.isArchived = group.isArchived && !!bean.isArchived;
    group.shotCount += counts.get(bean.id) || 0;
    group.bagCount++;
    groups.set(key, group);
  }

  return Array.from(groups.values())
    .filter(group => group.shotCount > 0)
    .sort((a, b) =>
      (b.shotCount - a.shotCount)
      || a.name.localeCompare(b.name)
      || a.roaster.localeCompare(b.roaster)
      || a.key.localeCompare(b.key)
    )
    .slice(0, limit)
    .map(({ newestCreatedAt, ...group }) => group);
}

function computeQualityBreakdown(shots) {
  const counts = Object.fromEntries(SHOT_QUALITY_ORDER.map(rating => [rating, 0]));
  let ratedTotal = 0;
  for (const shot of Array.isArray(shots) ? shots : []) {
    const rating = normalizeRating(shot?.rating);
    if (!rating || !(rating in counts)) continue;
    counts[rating]++;
    ratedTotal++;
  }
  return {
    ratedTotal,
    items: SHOT_QUALITY_ORDER.map(rating => ({
      rating,
      count: counts[rating],
      percentage: ratedTotal ? Math.round((counts[rating] / ratedTotal) * 100) : 0
    }))
  };
}

function getShotCreatedAtTime(shot) {
  const parsed = new Date(shot?.createdAt || '');
  return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
}

function getTrendMetricValue(shot, metric) {
  if (!shot) return null;
  if (metric === 'grind') {
    const grindSize = Number(shot.grindSize);
    return Number.isFinite(grindSize) && grindSize > 0 ? grindSize : null;
  }
  if (metric === 'ratio') {
    const doseIn = Number(shot.doseIn);
    const yieldOut = Number(shot.yieldOut);
    return Number.isFinite(doseIn) && Number.isFinite(yieldOut) && doseIn > 0 && yieldOut > 0
      ? yieldOut / doseIn
      : null;
  }
  if (metric === 'extractionTime') {
    const extractionTime = Number(shot.extractionTime);
    return Number.isFinite(extractionTime) && extractionTime > 0 ? extractionTime : null;
  }
  if (metric === 'flow') {
    const yieldOut = Number(shot.yieldOut);
    const extractionTime = Number(shot.extractionTime);
    return Number.isFinite(yieldOut) && Number.isFinite(extractionTime) && yieldOut > 0 && extractionTime > 0
      ? yieldOut / extractionTime
      : null;
  }
  return null;
}

function getBeanShotTrend(shots, beanId, metric) {
  if (!Array.isArray(shots) || !beanId) return [];
  return shots
    .map((shot, index) => {
      const value = getTrendMetricValue(shot, metric);
      if (shot?.beanId !== beanId || value == null) return null;
      const shotDate = getShotStatsDate(shot);
      return {
        id: shot.id || String(index),
        shotDate: shot?.shotDate || shot?.createdAt || '',
        createdAt: shot?.createdAt || '',
        value,
        orderDate: shotDate ? shotDate.getTime() : getShotCreatedAtTime(shot),
        orderCreatedAt: getShotCreatedAtTime(shot),
        orderIndex: index
      };
    })
    .filter(Boolean)
    .sort((a, b) =>
      (a.orderDate - b.orderDate)
      || (a.orderCreatedAt - b.orderCreatedAt)
      || (a.orderIndex - b.orderIndex)
    )
    .map(({ orderDate, orderCreatedAt, orderIndex, ...point }) => point);
}

function roundTrendCoord(value) {
  return Math.round(value * 100) / 100;
}

function getTrendScaleY(value, scale) {
  if (!scale || scale.max === scale.min) return BEAN_TREND_CHART_HEIGHT / 2;
  const plotHeight = scale.height - (scale.paddingY * 2);
  return scale.paddingY + ((scale.max - value) / (scale.max - scale.min)) * plotHeight;
}

function buildTrendTargetBand(scale, targetRange) {
  if (!targetRange || !scale) return null;
  const targetMin = Number(targetRange.min);
  const targetMax = Number(targetRange.max);
  if (!Number.isFinite(targetMin) || !Number.isFinite(targetMax)) return null;
  const clampedMin = Math.max(scale.min, Math.min(scale.max, targetMin));
  const clampedMax = Math.max(scale.min, Math.min(scale.max, targetMax));
  const yTop = roundTrendCoord(getTrendScaleY(clampedMax, scale));
  const yBottom = roundTrendCoord(getTrendScaleY(clampedMin, scale));
  return {
    x: scale.paddingX,
    y: yTop,
    width: scale.width - (scale.paddingX * 2),
    height: Math.max(1, roundTrendCoord(yBottom - yTop))
  };
}

function buildTrendPath(series, options = {}) {
  const values = (Array.isArray(series) ? series : [])
    .map(point => Number(point?.value))
    .filter(value => Number.isFinite(value));
  const width = BEAN_TREND_CHART_WIDTH;
  const height = BEAN_TREND_CHART_HEIGHT;
  const paddingX = BEAN_TREND_CHART_PADDING_X;
  const paddingY = BEAN_TREND_CHART_PADDING_Y;

  if (values.length === 0) {
    return {
      width,
      height,
      viewBox: `0 0 ${width} ${height}`,
      path: '',
      markPath: '',
      gridPath: '',
      axisPath: '',
      points: [],
      min: null,
      max: null,
      latest: null,
      yTicks: [],
      targetBand: null,
      scale: null
    };
  }

  const domainValues = values.concat((options.domainValues || []).map(Number).filter(value => Number.isFinite(value)));
  const min = Math.min(...values);
  const max = Math.max(...values);
  const domainMin = Math.min(...domainValues);
  const domainMax = Math.max(...domainValues);
  const isFlat = domainMin === domainMax;
  const range = domainMax - domainMin;
  const paddedMin = isFlat ? domainMin : domainMin - (range * BEAN_TREND_VALUE_PADDING_RATIO);
  const paddedMax = isFlat ? domainMax : domainMax + (range * BEAN_TREND_VALUE_PADDING_RATIO);
  const scale = { width, height, paddingX, paddingY, min: paddedMin, max: paddedMax };
  const plotWidth = width - (paddingX * 2);
  const lastIndex = Math.max(values.length - 1, 1);

  const points = values.map((value, index) => {
    const x = values.length === 1 ? width / 2 : paddingX + ((index / lastIndex) * plotWidth);
    const y = isFlat ? height / 2 : getTrendScaleY(value, scale);
    return { x: roundTrendCoord(x), y: roundTrendCoord(y), value };
  });

  const path = points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${point.x} ${point.y}`).join(' ');
  const markPath = points.map(point => `M ${point.x - 2} ${point.y} L ${point.x + 2} ${point.y} M ${point.x} ${point.y - 2} L ${point.x} ${point.y + 2}`).join(' ');
  const yTickValues = isFlat
    ? [min]
    : [domainMax, (domainMax + domainMin) / 2, domainMin];
  const yTicks = yTickValues.map(value => ({ value, y: roundTrendCoord(getTrendScaleY(value, scale)) }));
  const gridPath = yTicks.map(tick => `M ${paddingX} ${tick.y} L ${width - paddingX} ${tick.y}`).join(' ');
  const axisPath = `M ${paddingX} ${paddingY} L ${paddingX} ${height - paddingY} L ${width - paddingX} ${height - paddingY}`;
  return {
    width,
    height,
    viewBox: `0 0 ${width} ${height}`,
    path,
    markPath,
    gridPath,
    axisPath,
    points,
    min,
    max,
    latest: values[values.length - 1],
    yTicks,
    targetBand: buildTrendTargetBand(scale, options.targetRange),
    scale
  };
}

function normalizeRating(r) {
  if (r == null) return null;
  if (r === 'bad' || r === 'okay' || r === 'great' || r === 'perfect') return r;
  if (typeof r === 'number') {
    if (r <= 2) return 'bad';
    if (r === 3) return 'okay';
    if (r === 4) return 'great';
    return 'perfect';
  }
  return null;
}

// Freshness thresholds (should be constants)
const FRESHNESS_RESTING_DAYS = 7;
const FRESHNESS_OPTIMAL_DAYS = 21;

function getFreshness(bean) {
  if (!bean || !bean.roastDate) return { status: 'unknown', label: 'No roast date', detail: '' };
  const days = daysBetween(bean.roastDate, new Date());
  if (days < FRESHNESS_RESTING_DAYS) {
    return { status: 'resting', label: 'Resting', detail: `${FRESHNESS_RESTING_DAYS - days} days until peak` };
  }
  if (days <= FRESHNESS_OPTIMAL_DAYS) {
    return { status: 'optimal', label: 'At Peak', detail: `${FRESHNESS_OPTIMAL_DAYS - days} days remaining` };
  }
  return { status: 'past', label: 'Past Peak', detail: `Past peak by ${days - FRESHNESS_OPTIMAL_DAYS} days` };
}

// Espresso extraction standards
const EXTRACTION_TIME_FAST = 22;
const EXTRACTION_TIME_SLIGHTLY_FAST = 25;
const EXTRACTION_TIME_STANDARD_MAX = 30;
const EXTRACTION_TIME_SLIGHTLY_SLOW = 35;
const BREW_RATIO_VERY_LOW = 1.5;
const BREW_RATIO_LOW = 1.8;
const BREW_RATIO_NEAR_TARGET_LOW = 1.9;
const BREW_RATIO_NEAR_TARGET_HIGH = 2.2;
const FLOW_RATE_CHOKE_MAX = 1.0;
const FLOW_RATE_FAST_SLIGHT = 1.6;
const FLOW_RATE_FAST = 1.8;

function getShotAssessment(shot) {
  if (!shot) return null;
  const extractionTime = Number(shot.extractionTime);
  const doseIn = Number(shot.doseIn);
  const yieldOut = Number(shot.yieldOut);
  if (!Number.isFinite(extractionTime) || !Number.isFinite(doseIn) || !Number.isFinite(yieldOut)
    || extractionTime <= 0 || doseIn <= 0 || yieldOut <= 0) return null;
  const ratio = yieldOut / doseIn;
  const flowRate = yieldOut / extractionTime;
  // Choking: very low ratio AND low flow rate
  if (ratio < BREW_RATIO_VERY_LOW && flowRate < FLOW_RATE_CHOKE_MAX) {
    return { status: 'warning', label: 'Choked/channeled \u2192 go coarser' };
  }
  // Asymmetric basis: under-yield shots use projection; near/over-target use actual time.
  const projectedTime = (doseIn * 2 / yieldOut) * extractionTime;
  const useProjectedTime = ratio < BREW_RATIO_NEAR_TARGET_LOW;
  const t = useProjectedTime ? projectedTime : extractionTime;
  const belowTarget = ratio < BREW_RATIO_LOW;
  const overNearTarget = ratio > BREW_RATIO_NEAR_TARGET_HIGH;
  const pullLonger = belowTarget && t <= EXTRACTION_TIME_STANDARD_MAX;
  const cutSooner = overNearTarget && t >= EXTRACTION_TIME_SLIGHTLY_FAST;
  if (t < EXTRACTION_TIME_FAST) {
    return { status: 'warning', label: 'Under-extracted \u2192 go finer' + (pullLonger ? '\nPull longer' : '') + (cutSooner ? '\nCut sooner' : '') };
  } else if (t < EXTRACTION_TIME_SLIGHTLY_FAST) {
    return { status: 'warning', label: 'Slightly under-extracted \u2192 go slightly finer' + (pullLonger ? '\nPull longer' : '') + (cutSooner ? '\nCut sooner' : '') };
  } else if (t > EXTRACTION_TIME_SLIGHTLY_SLOW) {
    return { status: 'warning', label: 'Over-extracted \u2192 go coarser' + (overNearTarget ? '\nCut sooner' : '') };
  } else if (t > EXTRACTION_TIME_STANDARD_MAX) {
    return { status: 'warning', label: 'Slightly over-extracted \u2192 go slightly coarser' + (overNearTarget ? '\nCut sooner' : '') };
  }
  if (belowTarget) {
    return { status: 'warning', label: 'Good flow \u2192 pull longer' };
  }
  if (cutSooner) {
    if (flowRate >= FLOW_RATE_FAST) {
      return { status: 'warning', label: 'Fast flow + over target → go finer\nCut sooner' };
    }
    if (flowRate >= FLOW_RATE_FAST_SLIGHT) {
      return { status: 'warning', label: 'Fast flow + over target → go slightly finer\nCut sooner' };
    }
    return { status: 'warning', label: 'Good flow \u2192 cut sooner' };
  }
  return { status: 'good', label: 'Well-extracted' };
}

// --- localDateStr Tests ---
test('localDateStr - returns YYYY-MM-DD from Date object', () => {
  assertEqual(localDateStr(new Date(2026, 0, 15)), '2026-01-15');
});

test('localDateStr - pads single-digit month and day', () => {
  assertEqual(localDateStr(new Date(2026, 1, 5)), '2026-02-05');
});

test('localDateStr - works with no argument (returns today local)', () => {
  const now = new Date();
  const expected = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  assertEqual(localDateStr(), expected);
});

test('localDateStr - handles late-night dates correctly (no UTC shift)', () => {
  // Simulate 11pm on Feb 5 in local time — should still be Feb 5
  const lateNight = new Date(2026, 1, 5, 23, 0, 0);
  assertEqual(localDateStr(lateNight), '2026-02-05');
});

// --- Date Helper Tests ---
test('isSameDay - same day returns true', () => {
  assert(isSameDay('2026-01-15T08:00:00', '2026-01-15T20:00:00'));
});

test('isSameDay - different days returns false', () => {
  assert(!isSameDay('2026-01-15T08:00:00', '2026-01-16T08:00:00'));
});

test('addDays - adds positive days', () => {
  const result = addDays('2026-01-15T00:00:00', 7);

// 10 great/perfect shots: ratios 1.8-2.2 (x2 each), times 24-30
function sweetSpotShots() {
  const yields = [18, 18, 19, 19, 20, 20, 21, 21, 22, 22];
  const times = [24, 24, 26, 26, 27, 27, 28, 28, 30, 30];
  return yields.map((yieldOut, i) => ({
    rating: i % 2 ? 'perfect' : 'great',
    doseIn: 10,
    yieldOut,
    extractionTime: times[i]
  }));
}

test('computeSweetSpot - quartile bands from great and perfect shots', () => {
  const spot = computeSweetSpot(sweetSpotShots());
  assert(spot.eligible, '10 qualifying shots should be eligible');
  assertEqual(spot.count, 10);
  assertEqual(spot.ratio.low, 1.9);
  assertEqual(spot.ratio.high, 2.1);
  assertEqual(spot.time.low, 26);
  assertEqual(spot.time.high, 28);
});

test('computeSweetSpot - not eligible below ten qualifying shots', () => {
  const spot = computeSweetSpot(sweetSpotShots().slice(1));
  assertEqual(spot.count, 9);
  assert(!spot.eligible);
  assertEqual(spot.ratio, null);
  assertEqual(computeSweetSpot([]).eligible, false);
  assertEqual(computeSweetSpot(null).count, 0);
});

test('computeSweetSpot - ignores bad, okay, unrated, and invalid shots', () => {
  const noise = [
    { rating: 'bad', doseIn: 10, yieldOut: 40, extractionTime: 60 },
    { rating: 'okay', doseIn: 10, yieldOut: 40, extractionTime: 60 },
    { rating: null, doseIn: 10, yieldOut: 40, extractionTime: 60 },
    { rating: 'great', doseIn: 0, yieldOut: 40, extractionTime: 60 },
    { rating: 'perfect', doseIn: 10, yieldOut: 40 }
  ];
  const spot = computeSweetSpot(sweetSpotShots().concat(noise));
  assertEqual(spot.count, 10, 'Noise shots should not join the pool');
  assertEqual(spot.ratio.high, 2.1, 'Bands should be unaffected by noise shots');
});

test('computeSweetSpot - legacy numeric ratings are normalized', () => {
  const shots = sweetSpotShots().map((shot, i) => ({ ...shot, rating: i % 2 ? 5 : 4 }));
  const spot = computeSweetSpot(shots);
  assert(spot.eligible, 'Numeric 4/5 ratings should count as great/perfect');
  assertEqual(spot.count, 10);
});

test('Calendar weeks calculation', () => {
  // February 2026 starts on Sunday
  const year = 2026, month = 1; // February
  const first = new Date(year, month, 1);
  const startDay = first.getDay();
  assertEqual(startDay, 0); // Sunday
});

test('Calendar bar clipping works', () => {
  const monthStart = new Date(2026, 1, 1); // Feb 1
  const monthEnd = new Date(2026, 1, 28); // Feb 28
  const optStart = new Date(2026, 0, 25); // Jan 25
  const optEnd = new Date(2026, 1, 14); // Feb 14

  const clippedStart = optStart < monthStart ? monthStart : optStart;
  const clippedEnd = optEnd > monthEnd ? monthEnd : optEnd;

  assertEqual(clippedStart.getMonth(), 1); // Feb
  assertEqual(clippedEnd.getDate(), 14);
});

// --- hexToRgba Tests ---
function hexToRgba(hex, alpha) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return hex;
  return `rgba(${parseInt(m[1], 16)},${parseInt(m[2], 16)},${parseInt(m[3], 16)},${alpha})`;
}

test('hexToRgba converts correctly', () => {
  assertEqual(hexToRgba('#C2714F', 0.5), 'rgba(194,113,79,0.5)');
});

test('hexToRgba handles invalid hex', () => {
  assertEqual(hexToRgba('invalid', 0.5), 'invalid');
});

// --- UUID Fallback Test ---
test('crypto.randomUUID exists or fallback works', () => {
  let uuid;
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    uuid = crypto.randomUUID();
  } else {
    // Fallback
    uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }
  assert(uuid.length === 36);
  assert(uuid.includes('-'));
});

// --- Bean Occurrence Counter Tests ---
test('getBeanOccurrence counts correctly', () => {
  const beans = [
    { id: '1', name: 'Test', roaster: 'Roaster', createdAt: '2026-01-01' },
    { id: '2', name: 'Test', roaster: 'Roaster', createdAt: '2026-01-15' },
    { id: '3', name: 'Other', roaster: 'Roaster', createdAt: '2026-01-10' },
  ];

  function getBeanOccurrence(bean, allBeans) {
    const key = (bean.name || '').toLowerCase().trim() + '|' + (bean.roaster || '').toLowerCase().trim();
    const allMatching = allBeans.filter(b => {
      const bKey = (b.name || '').toLowerCase().trim() + '|' + (b.roaster || '').toLowerCase().trim();
      return bKey === key;
    }).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    return allMatching.findIndex(b => b.id === bean.id) + 1;
  }

  assertEqual(getBeanOccurrence(beans[0], beans), 1);
  assertEqual(getBeanOccurrence(beans[1], beans), 2);
  assertEqual(getBeanOccurrence(beans[2], beans), 1);
});

test('formatRoastDate handles empty', () => {
  function formatRoastDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return 'Roasted ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  assertEqual(formatRoastDate(''), '');
  assertEqual(formatRoastDate(null), '');
});

// ========================================
// Display Results
// ========================================
function displayResults() {
  const container = document.getElementById('results');
  const summary = document.getElementById('summary');

  let passed = 0, failed = 0;

  results.forEach(r => {
    const div = document.createElement('div');
    div.className = `test ${r.pass ? 'pass' : 'fail'}`;
    div.textContent = `${r.pass ? '✓' : '✗'} ${r.name}`;
    if (!r.pass) {
      div.textContent += ` — ${r.error}`;
      failed++;
    } else {
      passed++;
    }
    container.appendChild(div);
  });

  summary.className = `summary ${failed > 0 ? 'has-fail' : 'all-pass'}`;
  summary.textContent = `${passed} passed, ${failed} failed out of ${results.length} tests`;
}

displayResults();
